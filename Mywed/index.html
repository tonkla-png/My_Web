<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I am ต้นกล้า / TonKla</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="postmark" aria-hidden="true">
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="52" class="postmark-ring" />
      <circle cx="60" cy="60" r="38" class="postmark-ring-inner" />
      <text x="60" y="45" class="postmark-text" text-anchor="middle">TOUCH</text>
      <text x="60" y="80" class="postmark-text" text-anchor="middle">BASE</text>
      <line x1="14" y1="60" x2="106" y2="60" class="postmark-line" />
    </svg>
  </div>

  <main class="card" id="card">
    <header class="card-head">
      <span class="eyebrow" id="eyebrow">ยินดีที่ได้รู้จัก</span>
      <span class="location" id="location">Bangkok, TH</span>
    </header>

    <div class="avatar-wrap">
      <div class="avatar" id="avatar">
        <span id="avatarInitials">พ</span>
      </div>
    </div>

    <h1 class="name" id="name">ต้นกล้า</h1>
    <p class="role" id="role">ใครไม่รู้ &amp;อิสระ</p>

    <p class="bio" id="bio">
      สวัสดีค่ะ ✦ ทักมาคุยกันได้เลยตามช่องทางด้านล่าง
    </p>

    <hr class="divider">

    <section class="contacts" aria-label="ช่องทางติดต่อ">
      <span class="contacts-label">ติดต่อได้ที่</span>
      <div class="contact-grid" id="contactGrid"></div>
    </section>

    <footer class="card-foot">
      <span id="footNote">แตะไอคอนเพื่อไปยังโปรไฟล์</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
